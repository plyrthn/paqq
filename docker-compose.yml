services:
  usps-scraper:
    build:
      context: ./usps-scraper
    environment:
      PORT: "8790"
      USPS_HEADFUL: "0"
      USPS_SCRAPE_MAX_ATTEMPTS: "${USPS_SCRAPE_MAX_ATTEMPTS:-10}"
      UNIUNI_HEADFUL: "0"
      UNIUNI_SCRAPE_MAX_ATTEMPTS: "${UNIUNI_SCRAPE_MAX_ATTEMPTS:-6}"
      UNIUNI_TRACKING_KEY: "${UNIUNI_TRACKING_KEY:-}"
      UNIUNI_SCRAPER_TOKEN: "${UNIUNI_SCRAPER_TOKEN:-}"
      UPS_HEADFUL: "0"
      UPS_SCRAPE_MAX_ATTEMPTS: "${UPS_SCRAPE_MAX_ATTEMPTS:-5}"
      UPS_SCRAPER_TOKEN: "${UPS_SCRAPER_TOKEN:-}"
      YUNEXPRESS_HEADFUL: "0"
      YUNEXPRESS_SCRAPE_MAX_ATTEMPTS: "${YUNEXPRESS_SCRAPE_MAX_ATTEMPTS:-5}"
      YUNEXPRESS_SCRAPER_TOKEN: "${YUNEXPRESS_SCRAPER_TOKEN:-}"
      AMAZON_HEADFUL: "0"
      AMAZON_SCRAPER_TOKEN: "${AMAZON_SCRAPER_TOKEN:-}"
      AMAZON_IMPORT_TIMEOUT_MS: "${AMAZON_IMPORT_TIMEOUT_MS:-60000}"
      PAQQ_SCRAPER_STATE_DIR: "${PAQQ_SCRAPER_STATE_DIR:-/app/data/session-state}"
    ports:
      - "8790:8790"
    volumes:
      - scraper-data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8790/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    environment:
      PORT: "8787"
      HOST: "0.0.0.0"
      USPS_SCRAPER_URL: "http://usps-scraper:8790"
      USPS_SCRAPER_TOKEN: "${USPS_SCRAPER_TOKEN:-}"
      USPS_SCRAPER_TIMEOUT_MS: "${USPS_SCRAPER_TIMEOUT_MS:-300000}"
      UNIUNI_SCRAPER_URL: "http://usps-scraper:8790"
      UNIUNI_SCRAPER_TOKEN: "${UNIUNI_SCRAPER_TOKEN:-}"
      UNIUNI_SCRAPER_TIMEOUT_MS: "${UNIUNI_SCRAPER_TIMEOUT_MS:-300000}"
      UPS_SCRAPER_URL: "http://usps-scraper:8790"
      UPS_SCRAPER_TOKEN: "${UPS_SCRAPER_TOKEN:-}"
      UPS_SCRAPER_TIMEOUT_MS: "${UPS_SCRAPER_TIMEOUT_MS:-300000}"
      YUNEXPRESS_SCRAPER_URL: "http://usps-scraper:8790"
      YUNEXPRESS_SCRAPER_TOKEN: "${YUNEXPRESS_SCRAPER_TOKEN:-}"
      YUNEXPRESS_SCRAPER_TIMEOUT_MS: "${YUNEXPRESS_SCRAPER_TIMEOUT_MS:-300000}"
      AMAZON_SCRAPER_URL: "http://usps-scraper:8790"
      AMAZON_SCRAPER_TOKEN: "${AMAZON_SCRAPER_TOKEN:-}"
      AMAZON_SCRAPER_TIMEOUT_MS: "${AMAZON_SCRAPER_TIMEOUT_MS:-300000}"
      PAQQ_TRACKING_SCHEDULER_ENABLED: "${PAQQ_TRACKING_SCHEDULER_ENABLED:-true}"
      PAQQ_TRACKING_SCHEDULER_INTERVAL_MS: "${PAQQ_TRACKING_SCHEDULER_INTERVAL_MS:-14400000}"
      PAQQ_TRACKING_SCHEDULER_RUN_ON_START: "${PAQQ_TRACKING_SCHEDULER_RUN_ON_START:-true}"
      PAQQ_TRACKING_SCHEDULER_STATE_FILE: "${PAQQ_TRACKING_SCHEDULER_STATE_FILE:-/app/data/tracking-scheduler-state.json}"
      PAQQ_SETTINGS_FILE: "${PAQQ_SETTINGS_FILE:-/app/data/paqq-settings.json}"
      PAQQ_APPRISE_PYTHON_BIN: "${PAQQ_APPRISE_PYTHON_BIN:-python3}"
      PAQQ_APPRISE_TIMEOUT_MS: "${PAQQ_APPRISE_TIMEOUT_MS:-20000}"
    depends_on:
      usps-scraper:
        condition: service_healthy
    ports:
      - "8787:8787"
    volumes:
      - backend-data:/app/data
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8787/api/list').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    environment:
      PAQQ_API_BASE_URL: "${PAQQ_API_BASE_URL:-}"
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  backend-data:
  scraper-data:
